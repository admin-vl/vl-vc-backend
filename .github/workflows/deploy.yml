name: Backend Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: shauk
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Clone repo if not exists
            if [ ! -d "$HOME/vl-vc-backend" ]; then
              git clone https://github.com/admin-vl/vl-vc-backend.git $HOME/vl-vc-backend
            fi

            cd $HOME/vl-vc-backend

            # Pull latest code
            git pull origin main

            # Install dependencies
            npm install

            # Start or restart app
            pm2 restart backend || pm2 start index.js --name backend

            pm2 save
